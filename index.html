<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEDES DF - Gerador & Simulador de Questões</title>
    <meta name="description" content="Plataforma completa de simulados e questões inéditas para o concurso SEDES DF.">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="container">
        
        <!-- HEADER PRINCIPAL -->
        <header class="app-header">
            <h1>🏛️ SEDES DF - Questões & Simulados</h1>
            <p id="header-subtitle">Carregando módulo de estudos...</p>
        </header>

        <!-- BARRA DO USUÁRIO LOGADO E PROGRESSO GERAL -->
        <div id="user-bar" class="user-bar" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div class="user-info">
                    👤 <span id="user-name-display">Usuário</span>
                </div>
                <button class="btn btn-secondary" onclick="app.logout()" style="padding: 6px 14px; font-size: 0.85rem;">🚪 Sair</button>
            </div>
            <div id="global-stats-banner" style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; text-align: center; color: #93c5fd; width: 100%;">
                📊 <b>Seu Progresso Global:</b> <span id="stat-respondidas">0</span> / <span id="stat-total">3.103</span> Feitas (<span id="stat-percent">0%</span>) | Acertos: <span id="stat-acertos">0</span>
            </div>
        </div>

        <!-- VIEW: LOGIN -->
        <section id="view-login" class="login-wrapper">
            <div class="login-box">
                <h2>📚 Entrar no Sistema</h2>
                <form onsubmit="app.handleLogin(event)">
                    <div class="form-group">
                        <label for="input-login">Usuário</label>
                        <input type="text" id="input-login" class="form-input" placeholder="vitor ou gabi" required>
                    </div>
                    <div class="form-group">
                        <label for="input-senha">Senha</label>
                        <input type="password" id="input-senha" class="form-input" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-block">Entrar no Sistema 🚀</button>
                </form>
            </div>
        </section>

        <!-- VIEW: PILARES (CATEGORIAS) -->
        <section id="view-categories" style="display: none;">
            <div id="categories-grid" class="cards-grid"></div>
        </section>

        <!-- VIEW: ASSUNTOS (DASHBOARD) -->
        <section id="view-topics" style="display: none;">
            <div style="margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="app.showCategories()">⬅️ Voltar aos Pilares</button>
            </div>
            <div id="topics-grid" class="cards-grid"></div>
        </section>

        <!-- VIEW: QUIZ / SIMULADOR -->
        <section id="view-quiz" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
                <button class="btn btn-secondary" onclick="app.showTopics()">⬅️ Voltar aos Assuntos</button>
                <button class="btn btn-secondary" onclick="app.copyDirectLink()">🔗 Copiar Link Direto</button>
            </div>

            <!-- BARRA DE PROGRESSO -->
            <div class="progress-container">
                <div class="progress-header">
                    <span id="quiz-progress-text">Questão 1 de 40</span>
                    <span id="quiz-progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="quiz-progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- CARTÃO DA QUESTÃO -->
            <div class="question-card">
                <div id="quiz-question-text" class="question-text">Carregando questão...</div>
                <div id="quiz-alternatives"></div>
            </div>

            <!-- NAVEGAÇÃO -->
            <div class="quiz-nav">
                <button id="btn-prev" class="btn btn-secondary" onclick="app.prevQuestion()">⬅️ Anterior</button>
                <button id="btn-next" class="btn" onclick="app.nextQuestion()">Próxima ➡️</button>
            </div>
        </section>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">Mensagem de aviso</div>

    <script src="/js/app.js"></script>
</body>
</html>
